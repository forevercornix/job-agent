name: Darbo paieškos agentas

on:
  schedule:
    # Paleidžia kas savaitę ANTRADIENIAIS 6:00 UTC (~8:00/9:00 Lietuvos laiku,
    # priklausomai nuo vasaros laiko). Cron day-of-week: 2 = antradienis
    # (0=sekmadienis, 1=pirmadienis, 2=antradienis, ... 6=šeštadienis).
    - cron: "0 6 * * 2"
  workflow_dispatch: {}  # leidžia paleisti rankiniu būdu iš GitHub Actions skirtuko

permissions:
  contents: read  # jokio rašymo į repo nereikia - asmeniniai duomenys niekada necommitinami

# APSAUGA NUO LENKTYNIŲ SĄLYGOS (race condition): jei rankinis paleidimas
# (workflow_dispatch) sutaptų su suplanuotu cron paleidimu, abu procesai
# vienu metu rašytų į seen_jobs.json/circuit_breaker_state.json per
# actions/cache - paskutinis įrašęs "laimėtų", galimai prarandant kito
# paleidimo duomenis. `cancel-in-progress: false` reiškia, kad naujas
# paleidimas LAUKIA, kol baigsis ankstesnis, o ne nutraukia jį.
concurrency:
  group: job-search-agent
  cancel-in-progress: false

jobs:
  run-job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Repo checkout
        uses: actions/checkout@v6

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Priklausomybių diegimas
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      # seen_jobs.json IR circuit_breaker_state.json saugomi per Actions cache,
      # o NE per git commit, kad viešame repo niekada neatsirastų realių
      # paieškos rezultatų / šaltinių sveikatos istorijos
      - name: Atkurti seen_jobs.json ir circuit_breaker_state.json iš cache
        uses: actions/cache@v5
        with:
          path: |
            seen_jobs.json
            circuit_breaker_state.json
          key: agent-state-${{ github.run_id }}
          restore-keys: |
            agent-state-

      # Realūs (privatūs) šaltiniai per Secret - žr. docs/deployment.md "Realių šaltinių
      # naudojimas GitHub Actions". Jei SOURCES_LOCAL_YAML Secret nenustatytas,
      # šis žingsnis tiesiog nesukuria failo, ir scraper.py naudoja viešą
      # generinį sources.yaml (demo šaltiniai).
      #
      # PASTABA: `secrets` konteksto NEGALIMA naudoti tiesiogiai `if:` sąlygoje
      # (GitHub Actions apribojimas - "Unrecognized named-value: secrets").
      # Todėl patikra atliekama shell scripte per aplinkos kintamąjį, o ne `if:`.
      - name: Atkurti privačius šaltinius (sources.local.yaml) iš Secret
        env:
          SOURCES_LOCAL_YAML: ${{ secrets.SOURCES_LOCAL_YAML }}
        run: |
          if [ -n "$SOURCES_LOCAL_YAML" ]; then
            echo "$SOURCES_LOCAL_YAML" > sources.local.yaml
          fi

      - name: Paleisti darbo paieškos agentą
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEARCH_KEYWORDS: ${{ secrets.SEARCH_KEYWORDS }}
          CANDIDATE_PROFILE: ${{ secrets.CANDIDATE_PROFILE }}
          MIN_MATCH_SCORE: ${{ secrets.MIN_MATCH_SCORE }}
          LOG_FORMAT: json  # struktūrizuoti JSON logai - lengviau grep/jq analizuoti Actions loguose
        run: python main.py

      - name: Paruošti el. laiško tekstą
        run: python format_email.py

      - name: Patikrinti, ar yra ką siųsti
        id: check_body
        run: |
          if [ -s email_body.txt ]; then
            echo "has_content=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_content=false" >> "$GITHUB_OUTPUT"
          fi

      # Ta pati priežastis kaip aukščiau - `secrets` negalima tiesiogiai `if:`,
      # tad patikriname MAIL_SERVER buvimą per env+shell, rezultatą įrašome
      # kaip step output, ir TIK JĮ naudojame kito žingsnio `if:` sąlygoje.
      - name: Patikrinti, ar sukonfigūruotas el. paštas
        id: check_mail
        env:
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
        run: |
          if [ -n "$MAIL_SERVER" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Siųsti rezultatus el. paštu
        # Siunčiama TIK jei (a) yra ką siųsti IR (b) el. paštas sukonfigūruotas
        # (žr. "Patikrinti, ar sukonfigūruotas el. paštas" žingsnį aukščiau).
        if: steps.check_body.outputs.has_content == 'true' && steps.check_mail.outputs.configured == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Darbo paieškos agentas – nauji tinkami skelbimai"
          to: ${{ secrets.MAIL_TO }}
          from: Darbo paieškos agentas
          body: file://email_body.txt

      # PASTABA: viešame repo bet kuris prisijungęs GitHub vartotojas gali
      # atsisiųsti šį artefaktą (GitHub taisyklė - "read access" = visi viešam
      # repo). Jei el. laiškas jau siunčiamas aukščiau, šis žingsnis nebūtinas -
      # palikite jį tik jei norite ir papildomos kopijos Actions skirtuke.
      - name: Rezultatų įkėlimas kaip artefaktas
        uses: actions/upload-artifact@v7
        with:
          name: matched-jobs-${{ github.run_number }}
          path: |
            matched_jobs.json
            run_manifest.json
            circuit_breaker_state.json
          if-no-files-found: ignore
          retention-days: 30
