name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# Naujas push į tą pačią šaką atšaukia ankstesnį dar vykdomą CI paleidimą -
# CI neturi bendros persistuojamos būsenos (skirtingai nuo job-search.yml),
# tad čia saugu naudoti cancel-in-progress ir taupyti Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repo checkout
        uses: actions/checkout@v6

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Priklausomybių diegimas
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest su coverage
        run: pytest -v --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      # DEMO REŽIMO SMOKE TESTAS: realiai paleidžia `python main.py --demo`
      # BE ANTHROPIC_API_KEY (sąmoningai nenustatytas šiame žingsnyje) ir
      # patikrina, kad abu išvesties failai realiai sugeneruojami. Tai
      # automatiškai patvirtina KIEKVIENĄ push/PR, kad demo režimas realiai
      # veikia, o ne tik "veikė vieną kartą lokaliai paleidus".
      - name: Demo režimo patikra (be API rakto)
        run: |
          unset ANTHROPIC_API_KEY
          python main.py --demo
          test -f demo_matched_jobs.json
          test -f demo_email_preview.html
          echo "Demo režimas veikia - abu failai sugeneruoti be API rakto."

      - name: Coverage ataskaitos įkėlimas kaip artefaktas
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 30
