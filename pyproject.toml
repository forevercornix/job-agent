[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "*/site-packages/*",
    "*/.venv/*",
]

[tool.coverage.report]
# Eilutės, kurių NEREIKIA skaičiuoti kaip "neuždengtų" - dažniausiai
# apsauginis/nepasiekiamas kodas ar CLI entrypoint'ai
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
precision = 1

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]  # ilgesnes eilutes lietuviškame tekste/komentaruose leidžiame

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.mypy]
ignore_missing_imports = true
disallow_untyped_defs = false
